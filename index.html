function _bossHearts()  { return '❤️'.repeat(bossState.bossHP)   + '🖤'.repeat(6 - bossState.bossHP); }
function _playerHearts(){ return '❤️'.repeat(bossState.playerHP) + '🖤'.repeat(3 - bossState.playerHP); }

// 魔王關答錯共用：有槌子時自動跳出是/否對話框
function _bossWrongAnswer(correctText, wordId) {
  playSound('wrong');
  if (wordId && !gameState.session.wrongWords.includes(wordId))
    gameState.session.wrongWords.push(wordId);
  const sp = document.getElementById('pl-sprite');
  if (sp) { sp.style.animation='none'; void sp.offsetWidth; sp.style.animation='playerHit 0.4s ease-out'; }
  function advanceRound() { bossState.round++; showBossRound(); }
  setTimeout(() => {
    const h = gameState.session.hammerCount;
    if (h > 0) {
      // 自動跳出槌子確認對話框
      document.getElementById('event-modal').insertAdjacentHTML('beforeend',
        `<div class="event-result-banner bad" style="margin-top:10px">💥 被攻擊！${correctText}</div>
         <div style="background:white;border:3px solid #FF6B35;border-radius:20px;
                     padding:14px 16px;margin-top:10px;text-align:center">
           <div style="font-size:30px">🔨</div>
           <div style="font-size:15px;font-weight:900;color:#333;margin:6px 0">
             要用一支槌子保住這顆心嗎？
           </div>
           <div style="font-size:13px;color:#888;margin-bottom:12px">現有 ${h} 支槌子</div>
           <div style="display:flex;gap:10px;justify-content:center">
             <button onclick="window._bossHC(true)"
               style="background:#4CAF50;color:white;border:none;border-radius:50px;
                      padding:10px 22px;font-size:16px;font-weight:900;
                      font-family:inherit;cursor:pointer;box-shadow:0 4px 0 #388E3C">
               ✅ 是，用槌子！
             </button>
             <button onclick="window._bossHC(false)"
               style="background:#eee;color:#555;border:none;border-radius:50px;
                      padding:10px 22px;font-size:16px;font-weight:900;
                      font-family:inherit;cursor:pointer;box-shadow:0 4px 0 #bbb">
               ❌ 否，扣血
             </button>
           </div>
         </div>`);
      window._bossHC = function(useHammer) {
        window._bossHC = null;
        if (useHammer && gameState.session.hammerCount > 0) {
          gameState.session.hammerCount--;
          updateHUD();
          document.getElementById('event-modal').insertAdjacentHTML('beforeend',
            `<div style="text-align:center;font-size:15px;color:#2E7D32;
                         font-weight:900;margin-top:8px">
               🔨 槌子擋住攻擊！❤️ 保住了！
             </div>`);
          setTimeout(advanceRound, 1200);
        } else {
          bossState.playerHP--;
          const hp = document.getElementById('pl-hp');
          if (hp) hp.textContent = _playerHearts();
          setTimeout(advanceRound, 900);
        }
      };
    } else {
      // 沒有槌子：直接扣血，自動繼續
      bossState.playerHP--;
      const hp = document.getElementById('pl-hp');
      if (hp) hp.textContent = _playerHearts();
      document.getElementById('event-modal').insertAdjacentHTML('beforeend',
        `<div class="event-result-banner bad" style="margin-top:10px">
           💥 被攻擊！${correctText}　${_playerHearts()}
         </div>`);
      setTimeout(advanceRound, 1800);
    }
  }, 400);
}

function _bossHUD() {
  const char = CHARACTER_EMOJIS[gameState.player.character] || '🐧';
  return `<div class="boss-hud">
    <div class="boss-side">
      <div id="bs-sprite" style="font-size:28px">👹</div>
      <div style="font-size:11px;font-weight:900;color:#ef5350">大魔王</div>
      <div style="font-size:15px" id="bs-hp">${_bossHearts()}</div>
    </div>
    <div class="boss-round-badge">第 ${bossState.round+1} / 6 關</div>
    <div class="boss-side">
      <div id="pl-sprite" style="font-size:28px">${char}</div>
      <div style="font-size:11px;font-weight:900;color:#1565C0">${gameState.player.name}</div>
      <div style="font-size:15px" id="pl-hp">${_playerHearts()}</div>
    </div>
  </div>`;
}

function showBossRound() {
  if (bossState.bossHP   <= 0) { bossBattleEnd(true);  return; }
  if (bossState.playerHP <= 0) { bossBattleEnd(false); return; }
  if (bossState.round    >= 6) { bossBattleEnd(bossState.bossHP < bossState.playerHP); return; }

  const type = bossState.roundTypes[bossState.round];
  if (type === 'lightning') {
    bossState.lightningWords = shuffleArray(bossState.words).slice(0, 3);
    bossState.lightningIdx   = 0;
    bossState.lightningScore = 0;
    showBossLightningQ();
    return;
  }
  const word = bossState.words[bossState.round % bossState.words.length];
  bossState.currentType = type;
  if (type === 'spell') {
    showBossSpellQuestion(word);
    return;
  }
  const wrongCount = (type === 'listen_pick' || type === 'eng_zh') ? 2 : 3;
  const wrongs = shuffleArray(Object.values(ALL_WORDS).filter(w => w.id !== word.id)).slice(0, wrongCount);
  const opts   = shuffleArray([word, ...wrongs]);
  showBossQuestion(type, word, opts);
}

function showBossQuestion(type, word, opts) {
  const labels = {
    picture:'🖼️ 看圖選字', listen:'🔊 聽音選字', chinese:'🀄 中文選英文',
    spell:'✏️ 拼字', sentence:'💬 句型填空',
    listen_pick:'👂 聽音選字', eng_zh:'🔤 看英文選中文'
  };
  let qHtml = '';

  if (type === 'picture') {
    qHtml = `<div style="font-size:68px;margin:8px 0">${word.emoji}</div>
      <div style="font-size:28px;font-weight:900;color:#333;margin:4px 0">${word.chinese}</div>
      <button class="btn-speak" style="padding:8px 18px;font-size:15px;margin-bottom:8px"
        onclick="speakWord('${word.english.replace(/'/g,"\\'")}')">🔊 聽發音</button>`;
  } else if (type === 'listen') {
    qHtml = `<div style="font-size:36px;margin:6px 0">🔊</div>
      <button class="btn-speak" style="padding:8px 18px;font-size:15px;margin-bottom:8px"
        onclick="speakWord('${word.english}')">再聽一次</button>`;
    setTimeout(() => speakWord(word.english), 300);
  } else if (type === 'listen_pick') {
    qHtml = `<div style="font-size:52px;margin:8px 0">🎵</div>
      <button class="btn-speak" style="padding:10px 24px;font-size:16px;margin-bottom:8px"
        onclick="speakWord('${word.english.replace(/'/g,"\\'")}')">🔊 聽發音</button>`;
    setTimeout(() => speakWord(word.english), 300);
  } else if (type === 'chinese') {
    qHtml = `<div style="font-size:42px;font-weight:900;color:#333;margin:10px 0">${word.chinese}</div>
      <button class="btn-speak" style="padding:8px 18px;font-size:15px;margin-bottom:8px"
        onclick="speakWord('${word.english}')">🔊 聽發音</button>`;
  } else if (type === 'eng_zh') {
    qHtml = `<div style="font-size:42px;font-weight:900;color:#1565C0;letter-spacing:2px;margin:10px 0">${word.english}</div>
      <button class="btn-speak" style="padding:8px 18px;font-size:15px;margin-bottom:8px"
        onclick="speakWord('${word.english.replace(/'/g,"\\'")}')">🔊 聽發音</button>`;
  } else if (type === 'spell') {
    const hidden = word.english.slice(0,-1) + '_';
    qHtml = `<div style="font-size:36px;font-weight:900;letter-spacing:6px;color:#333;margin:10px 0">${word.emoji} ${hidden}</div>`;
  } else if (type === 'sentence') {
    const sent = word.sentences && word.sentences[0];
    const display = sent
      ? `<div style="font-size:17px;font-weight:700;color:#333;margin:8px 0;line-height:1.6">"${sent.en.replace(new RegExp(word.english,'i'),'___')}"</div><div style="font-size:12px;color:#aaa">${sent.zh}</div>`
      : `<div style="font-size:68px;margin:8px 0">${word.emoji}</div>`;
    qHtml = display;
  }

  const btnLabel = (o) => type === 'eng_zh' ? o.chinese : o.english;
  showEventOverlay(`
    ${_bossHUD()}
    <div class="boss-q-type">${labels[type]||type}</div>
    ${qHtml}
    <div class="event-answers" style="margin-top:8px">
      ${opts.map(o=>`<button class="event-answer-btn" data-id="${o.id}" onclick="bossAnswer('${o.id}','${word.id}')">${btnLabel(o)}</button>`).join('')}
    </div>`);
}

function bossAnswer(selId, correctId) {
  document.querySelectorAll('.event-answer-btn').forEach(b => {
    b.onclick = null; b.style.pointerEvents = 'none';
    if (b.dataset.id === correctId) b.classList.add('correct');
    else if (b.dataset.id === selId) b.classList.add('wrong');
  });
  if (selId === correctId) {
    playSound('correct');
    bossState.bossHP--;
    const sp = document.getElementById('bs-sprite');
    if (sp) sp.style.animation = 'bossHit 0.4s ease-out';
    setTimeout(() => {
      const hp = document.getElementById('bs-hp');
      if (hp) hp.textContent = _bossHearts();
      document.getElementById('event-modal').insertAdjacentHTML('beforeend',
        `<div class="event-result-banner good" style="margin-top:10px">⚔️ 命中！大魔王 ${_bossHearts()}</div>`);
      bossState.round++;
      setTimeout(showBossRound, 1300);
    }, 400);
  } else {
    const _cw = ALL_WORDS[correctId];
    const _hint = (bossState.currentType === 'eng_zh') ? `正確：「${_cw.chinese}」` : `正確：「${_cw.english}」`;
    _bossWrongAnswer(_hint, correctId);
  }
}

function showBossLightningQ() {
  if (bossState.lightningIdx >= 3) {
    clearCellTimer();
    const score = bossState.lightningScore;
    if (score >= 2) {
      playSound('correct'); bossState.bossHP--;
      showEventOverlay(`${_bossHUD()}
        <div style="font-size:44px;margin:10px 0">⚡</div>
        <div class="event-result-banner good">閃電回合勝利！答對 ${score}/3 ！<br>大魔王 ${_bossHearts()}</div>
        <button class="btn btn-primary" style="margin-top:12px" onclick="_bossLightningNext()">繼續！</button>`);
    } else {
      playSound('wrong');
      const h = gameState.session.hammerCount;
      const hamDialog = h > 0
        ? `<div style="background:white;border:3px solid #FF6B35;border-radius:20px;
                       padding:14px 16px;margin-top:10px;text-align:center">
             <div style="font-size:30px">🔨</div>
             <div style="font-size:15px;font-weight:900;color:#333;margin:6px 0">
               要用一支槌子保住這顆心嗎？
             </div>
             <div style="font-size:13px;color:#888;margin-bottom:12px">現有 ${h} 支槌子</div>
             <div style="display:flex;gap:10px;justify-content:center">
               <button onclick="window._bossLightHC(true)"
                 style="background:#4CAF50;color:white;border:none;border-radius:50px;
                        padding:10px 22px;font-size:16px;font-weight:900;
                        font-family:inherit;cursor:pointer;box-shadow:0 4px 0 #388E3C">
                 ✅ 是，用槌子！
               </button>
               <button onclick="window._bossLightHC(false)"
                 style="background:#eee;color:#555;border:none;border-radius:50px;
                        padding:10px 22px;font-size:16px;font-weight:900;
                        font-family:inherit;cursor:pointer;box-shadow:0 4px 0 #bbb">
                 ❌ 否，扣血
               </button>
             </div>
           </div>`
        : `<button class="btn btn-primary" style="margin-top:12px" onclick="_bossLightningNext()">繼續！</button>`;
      showEventOverlay(`${_bossHUD()}
        <div style="font-size:44px;margin:10px 0">⚡</div>
        <div class="event-result-banner bad">答對 ${score}/3，被魔王攻擊！</div>
        ${hamDialog}`);
      window._bossLightHC = function(useHammer) {
        window._bossLightHC = null;
        if (useHammer && gameState.session.hammerCount > 0) {
          gameState.session.hammerCount--;
          updateHUD();
          document.getElementById('event-modal').insertAdjacentHTML('beforeend',
            `<div style="text-align:center;font-size:15px;color:#2E7D32;
                         font-weight:900;margin-top:8px">
               🔨 槌子擋住攻擊！❤️ 保住了！
             </div>
             <button class="btn btn-primary" style="margin-top:8px" onclick="_bossLightningNext()">繼續！</button>`);
        } else {
          bossState.playerHP--;
          document.getElementById('event-modal').insertAdjacentHTML('beforeend',
            `<div style="font-size:14px;color:#888;margin-top:4px">${_playerHearts()}</div>
             <button class="btn btn-primary" style="margin-top:8px" onclick="_bossLightningNext()">繼續！</button>`);
        }
      };
    }
    window._bossLightningNext = () => { bossState.round++; showBossRound(); };
    return;
  }

  const word   = bossState.lightningWords[bossState.lightningIdx];
  const wrongs = shuffleArray(Object.values(ALL_WORDS).filter(w => w.id !== word.id)).slice(0, 3);
  const opts   = shuffleArray([word, ...wrongs]);
  let timeLeft = 6, answered = false;

  showEventOverlay(`
    ${_bossHUD()}
    <div class="boss-q-type">⚡ 閃電回合 ${bossState.lightningIdx+1} / 3</div>
    <div class="timer-bar-wrap"><div class="timer-bar" id="lt-bar" style="width:100%;background:#FFD93D"></div></div>
    <div style="font-size:60px;margin:6px 0">${word.emoji}</div>
    <div class="event-answers">
      ${opts.map(o=>`<button class="event-answer-btn" data-id="${o.id}" onclick="_ltAnswer('${o.id}','${word.id}')">${o.english}</button>`).join('')}
    </div>`);

  window._ltAnswer = function(selId, correctId) {
    if (answered) return;
    answered = true; clearCellTimer();
    document.querySelectorAll('.event-answer-btn').forEach(b => {
      b.onclick = null; b.style.pointerEvents = 'none';
      if (b.dataset.id === correctId) b.classList.add('correct');
      else if (b.dataset.id === selId) b.classList.add('wrong');
    });
    if (selId === correctId) { playSound('correct'); bossState.lightningScore++; }
    else { playSound('wrong'); }
    bossState.lightningIdx++;
    setTimeout(showBossLightningQ, 700);
  };

  _cellEventTimer = setInterval(() => {
    if (answered) { clearCellTimer(); return; }
    timeLeft -= 0.1;
    const bar = document.getElementById('lt-bar');
    if (bar) bar.style.width = Math.max(0, (timeLeft/6)*100) + '%';
    if (timeLeft <= 0) { clearCellTimer(); if (!answered) window._ltAnswer('__timeout__', word.id); }
  }, 100);
}

// ── Boss 拼字關 ──────────────────────────────────────────
function showBossSpellQuestion(word) {
  const blankIdx = word.english.length > 2
    ? 1 + Math.floor(Math.random() * (word.english.length - 1))
    : 0;
  const correctLetter = word.english[blankIdx].toLowerCase();
  const displayWord = word.english.split('').map((c, i) =>
    `<span style="${i===blankIdx?'color:#ef5350;font-size:1.3em;font-weight:900':''}">${i===blankIdx?'_':c}</span>`
  ).join('');
  const wrongLetters = shuffleArray(
    'abcdefghijklmnopqrstuvwxyz'.split('').filter(l => l !== correctLetter)
  ).slice(0, 2);
  const letterOpts = shuffleArray([correctLetter, ...wrongLetters]);

  showEventOverlay(`
    ${_bossHUD()}
    <div class="boss-q-type">✏️ 拼字填空</div>
    <div style="font-size:52px;margin:6px 0">${word.emoji}</div>
    <button class="btn-speak" style="padding:6px 16px;font-size:14px;margin-bottom:8px"
      onclick="speakWord('${word.english}')">
      🔊 聽發音
    </button>
    <div style="font-size:32px;font-weight:900;letter-spacing:8px;color:#333;margin:8px 0;font-family:monospace">${displayWord}</div>
    <div class="lucky-cards" style="margin:10px 0">
      ${letterOpts.map(l=>`<div class="lucky-card" data-letter="${l}"
        style="width:68px;height:68px;font-size:30px;font-weight:900;font-family:monospace"
        onclick="bossSpellAnswer('${l}','${correctLetter}','${word.id}')">${l}</div>`).join('')}
    </div>`);
}

window.bossSpellAnswer = function(selected, correct, wordId) {
  document.querySelectorAll('#cell-event-overlay .lucky-card').forEach(c => {
    c.onclick = null;
    if (c.dataset.letter === correct) c.classList.add('revealed');
    else if (c.dataset.letter === selected && selected !== correct) c.classList.add('dim');
  });
  if (selected === correct) {
    playSound('correct');
    bossState.bossHP--;
    const sp = document.getElementById('bs-sprite');
    if (sp) { sp.style.animation='none'; void sp.offsetWidth; sp.style.animation='bossHit 0.4s ease-out'; }
    setTimeout(() => {
      const hp = document.getElementById('bs-hp');
      if (hp) hp.textContent = _bossHearts();
      document.getElementById('event-modal').insertAdjacentHTML('beforeend',
        `<div class="event-result-banner good" style="margin-top:10px">⚔️ 命中！大魔王 ${_bossHearts()}</div>`);
      bossState.round++;
      setTimeout(showBossRound, 1300);
    }, 400);
  } else {
    playSound('wrong');
    _bossWrongAnswer(`正確字母是「${correct}」`, wordId);
  }
};

function bossBattleEnd(playerWon) {
  clearCellTimer();
  stopGameTimer();
  // 累積道具：無論勝敗，保留槌子與飯糰到下一局
  try {
    const prof = getCurrentProfile();
    if (prof) {
      prof.savedHammerCount  = gameState.session.hammerCount  || 0;
      prof.savedOnigiriCount = gameState.session.onigiriCount || 0;
      prof.savedAnimalFed    = gameState.session.animalFed    || 0;
      saveProgress();
    }
  } catch(e) {}
  diceRolling = false;
  if (playerWon) {
    playSound('hammer'); spawnStars();
    try {
      gameState.progress.completedSessions.push({ level: gameState.player.level, date: Date.now() });
      // Update player profile
      const profile = getCurrentProfile();
      if (profile) {
        gameState.session.wordGroups.flat().forEach(id => {
          if (!profile.learnedWordIds.includes(id)) profile.learnedWordIds.push(id);
        });
        gameState.session.wrongWords.forEach(id => {
          if (!profile.wrongWordIds) profile.wrongWordIds = [];
          if (!profile.wrongWordIds.includes(id)) profile.wrongWordIds.push(id);
        });
        profile.sessionsCompleted = (profile.sessionsCompleted || 0) + 1;
        profile.lastPlayed = Date.now();
        // 學完全部 Level 1 單字後解鎖 Level 2
        if (!profile.unlockedLevels) profile.unlockedLevels = [1];
        if (profile.learnedWordIds.length >= ALL_WORD_IDS.length) {
          if (!profile.unlockedLevels.includes(2)) profile.unlockedLevels.push(2);
        }
        if (profile.learnedWordIds.length >= ALL_WORD_IDS.length * 2) {
          if (!profile.unlockedLevels.includes(3)) profile.unlockedLevels.push(3);
        }
        // 記錄每局紀錄
        if (!profile.sessionHistory) profile.sessionHistory = [];
        profile.sessionHistory.push({
          level: wonLv, date: Date.now(),
          learned: profile.learnedWordIds.length,
          hammers: gameState.session.hammerCount || 0
        });
      }
      const nextLv = gameState.player.level + 1;
      if (nextLv <= 3 && !gameState.progress.unlockedLevels.includes(nextLv))
        gameState.progress.unlockedLevels.push(nextLv);
      gameState.session.wrongWords.forEach(id => {
        if (!gameState.progress.totalWrongWords.includes(id))
          gameState.progress.totalWrongWords.push(id);
      });
      clearSavedSession();
      saveProgress();
      // 角色解鎖檢查
      const newUnlock = checkCharacterUnlocks();
      if (newUnlock) {
        saveProgress();
        setTimeout(() => showEventOverlay(`
          <div style="font-size:72px;animation:bounceIn 0.5s ease-out">${CHARACTER_EMOJIS[newUnlock.id]}</div>
          <div style="font-size:24px;font-weight:900;color:#FF6B35;margin:10px 0">🎉 新角色解鎖！</div>
          <div style="font-size:20px;font-weight:900;color:#333;margin-bottom:8px">${newUnlock.name}</div>
          <div style="font-size:14px;color:#888;margin-bottom:16px">下次選角色時就能使用囉！</div>
          <button class="btn btn-primary" onclick="hideEventOverlay()">太棒了！</button>`), 1500);
      }
    } catch(e) {}
  }
  // Check maze trigger (every 3 wins)
  let triggerMaze = false;
  if (playerWon) {
    try {
      const p = getCurrentProfile();
      triggerMaze = !!(p && p.sessionsCompleted > 0 && p.sessionsCompleted % 3 === 0);
    } catch(e) {}
  }
  // Show wrong words review first (if any), then show result screen
  const wrongIds = [...gameState.session.wrongWords];
  if (wrongIds.length > 0) {
    showWrongWordsReview(wrongIds, () => showBossResult(playerWon, triggerMaze));
  } else {
    showBossResult(playerWon, triggerMaze);
  }
}

const MAZE_MELODY = [

function startMazeQuiz() { showMazeQuestion(); }

function showMazeQuestion() {
  if (!_mazeState) return;
  const { words, breadCount, askedSet } = _mazeState;

  let pool = words.filter(w => !askedSet.has(w.id));
  if (pool.length === 0) { askedSet.clear(); pool = [...words]; }
  const word = shuffleArray(pool)[0];
  askedSet.add(word.id);
  _mazeState.current = word;

  // sentence 加權 2 倍，其餘各 1
  const allTypes = ['picture','listen','chinese','spell','sentence','sentence','listen_pick','eng_zh'];
  const hist = _mazeState.typeHistory;
  let qType = allTypes[Math.floor(Math.random() * allTypes.length)];
  if (hist.length >= 2 && hist[hist.length-1] === hist[hist.length-2] && hist[hist.length-1] === qType) {
    const others = allTypes.filter(t => t !== qType);
    qType = others[Math.floor(Math.random() * others.length)];
  }
  hist.push(qType);
  if (hist.length > 2) hist.shift();
  _mazeState.currentType = qType;

  const breadRow = Array.from({length:5}).map((_,i) =>
    `<span style="font-size:26px${i >= breadCount ? ';opacity:0.2' : ''}">🍞</span>`).join('');

  let qHtml = '';
  let instruction = '選出正確的英文單字！';
  let autoSpeak = true;
  let customAnswers = null; // spell 型用字母按鈕，跳過 allOpts

  if (qType === 'picture') {
    qHtml = `<div style="font-size:64px;margin:6px 0">${word.emoji}</div>
       <div style="font-size:26px;font-weight:900;color:#333;margin:4px 0">${word.chinese}</div>
       <button class="btn-speak" style="padding:8px 18px;font-size:15px;margin-bottom:6px"
         onclick="speakWord('${word.english.replace(/'/g,"\\'")}')">🔊 聽發音</button>`;
  } else if (qType === 'listen') {
    qHtml = `<div style="font-size:48px;margin:8px 0">🔊</div>
       <button class="btn-speak" style="padding:8px 18px;font-size:15px;margin-bottom:6px"
         onclick="speakWord('${word.english.replace(/'/g,"\\'")}')">再聽一次</button>`;
  } else if (qType === 'listen_pick') {
    qHtml = `<div style="font-size:48px;margin:8px 0">🎵</div>
       <button class="btn-speak" style="padding:10px 24px;font-size:16px;margin-bottom:6px"
         onclick="speakWord('${word.english.replace(/'/g,"\\'")}')">🔊 聽發音</button>`;
  } else if (qType === 'chinese') {
    qHtml = `<div style="font-size:36px;font-weight:900;color:#333;margin:10px 0">${word.chinese}</div>
       <button class="btn-speak" style="padding:8px 18px;font-size:15px;margin-bottom:6px"
         onclick="speakWord('${word.english.replace(/'/g,"\\'")}')">🔊 聽發音</button>`;
  } else if (qType === 'eng_zh') {
    qHtml = `<div style="font-size:40px;font-weight:900;color:#1565C0;letter-spacing:2px;margin:10px 0">${word.english}</div>
       <button class="btn-speak" style="padding:8px 18px;font-size:15px;margin-bottom:6px"
         onclick="speakWord('${word.english.replace(/'/g,"\\'")}')">🔊 聽發音</button>`;
    instruction = '選出正確的中文意思！';
    autoSpeak = false;
  } else if (qType === 'spell') {
    const spBlankIdx = word.english.length > 2
      ? 1 + Math.floor(Math.random() * (word.english.length - 1))
      : word.english.length - 1;
    const spCorrect = word.english[spBlankIdx].toLowerCase();
    const spDisplay = word.english.split('').map((c,i) =>
      i===spBlankIdx ? '<span style="color:#ef5350;font-size:1.3em;font-weight:900">_</span>' : c
    ).join('');
    const spWrong = shuffleArray('abcdefghijklmnopqrstuvwxyz'.split('').filter(l => l !== spCorrect)).slice(0,2);
    const spOpts = shuffleArray([spCorrect, ...spWrong]);
    qHtml = `<div style="font-size:56px;margin:6px 0">${word.emoji}</div>
       <button class="btn-speak" style="padding:6px 16px;font-size:14px;margin-bottom:8px"
         onclick="speakWord('${word.english.replace(/'/g,"\\'")}')">🔊 聽發音</button>
       <div style="font-size:32px;font-weight:900;letter-spacing:6px;color:#333;margin:8px 0;font-family:monospace">${spDisplay}</div>`;
    instruction = '選出缺少的字母！';
    customAnswers = `<div class="lucky-cards" style="margin:10px 0">
      ${spOpts.map(l => `<div class="lucky-card" data-letter="${l}"
        style="width:64px;height:64px;font-size:28px;font-weight:900;font-family:monospace"
        onclick="mazeSpellAnswer('${l}','${spCorrect}','${word.id}')">${l}</div>`).join('')}
    </div>`;
  } else if (qType === 'sentence') {
    const sent = word.sentences && word.sentences[0];
    const blankSent = sent ? sent.en.replace(new RegExp('\\b'+word.english+'[a-z]*\\b','gi'),'___') : word.english;
    qHtml = `<div style="font-size:18px;font-weight:700;color:#333;line-height:1.7;margin:10px 0">"${blankSent}"</div>
       ${sent ? `<div style="font-size:13px;color:#aaa;margin-bottom:4px">${sent.zh}</div>` : ''}`;
    autoSpeak = false;
  }

  if (!customAnswers) {
    const wrongCount = (qType === 'listen_pick' || qType === 'eng_zh') ? 2 : 3;
    const opts = shuffleArray(Object.values(ALL_WORDS).filter(w => w.id !== word.id)).slice(0, wrongCount);
    const allOpts = shuffleArray([word, ...opts]);
    const btnLabel = (o) => qType === 'eng_zh' ? o.chinese : o.english;
    customAnswers = `<div class="event-answers" style="margin-top:4px">
      ${allOpts.map(o =>
        `<button class="event-answer-btn" data-id="${o.id}"
           onclick="mazeAnswer('${o.id}','${word.id}')">${btnLabel(o)}</button>`
      ).join('')}
    </div>`;
  }

  showEventOverlay(`
    <div style="font-size:18px;font-weight:900;color:#8B4513;margin-bottom:6px">🏚️ 複習迷宮</div>
    <div style="display:flex;justify-content:center;gap:6px;margin-bottom:4px">${breadRow}</div>
    <div style="font-size:13px;color:#aaa;margin-bottom:10px">已收集 ${breadCount} / 5 塊麵包屑</div>
    ${qHtml}
    <div style="font-size:14px;font-weight:700;color:#666;margin:8px 0">${instruction}</div>
    ${customAnswers}`);

  if (autoSpeak) setTimeout(() => speakWord(word.english), 400);
}

window.mazeSpellAnswer = function(selected, correct, wordId) {
  document.querySelectorAll('#cell-event-overlay .lucky-card').forEach(c => {
    c.onclick = null;
    if (c.dataset.letter === correct) c.classList.add('revealed');
    else if (c.dataset.letter === selected && selected !== correct) c.classList.add('dim');
  });
  if (selected === correct) {
    playSound('bread'); spawnStars();
    _mazeState.breadCount++;
    const bc = _mazeState.breadCount;
    document.getElementById('event-modal').insertAdjacentHTML('beforeend',
      `<div class="event-result-banner good" style="margin-top:10px">
        🍞 答對！收集第 ${bc} 塊麵包屑！${bc >= 5 ? ' 🎉 集滿了！' : ''}
       </div>`);
    setTimeout(bc >= 5 ? showMazeComplete : showMazeQuestion, 1500);
  } else {
    playSound('wrong');
    document.getElementById('event-modal').insertAdjacentHTML('beforeend',
      `<div class="event-result-banner bad" style="margin-top:10px">
        ❌ 答錯！正確字母是「${correct}」，繼續加油！
       </div>`);
    setTimeout(showMazeQuestion, 2000);
  }
};

function mazeAnswer(selId, correctId) {
  document.querySelectorAll('.event-answer-btn').forEach(b => {
    b.onclick = null; b.style.pointerEvents = 'none';
    if (b.dataset.id === correctId) b.classList.add('correct');
    else if (b.dataset.id === selId && selId !== correctId) b.classList.add('wrong');
  });
  if (selId === correctId) {
    playSound('bread'); spawnStars();
    _mazeState.breadCount++;
    const bc = _mazeState.breadCount;
    document.getElementById('event-modal').insertAdjacentHTML('beforeend',
      `<div class="event-result-banner good" style="margin-top:10px">
        🍞 答對！收集第 ${bc} 塊麵包屑！${bc >= 5 ? ' 🎉 集滿了！' : ''}
       </div>`);
    setTimeout(bc >= 5 ? showMazeComplete : showMazeQuestion, 1500);
  } else {
    playSound('wrong');
    const correctWord = ALL_WORDS[correctId];

       </div>`);
    setTimeout(showMazeQuestion, 2000);
  }
}

function showMazeFeedBread() {
  const char = gameState.player.character || 'penguin';
  const pet = CHARACTER_EMOJIS[char] || '🐧'; const petName = CHARACTER_NAMES[char] || '夥伴';

  showEventOverlay(`
    <div style="font-size:24px;font-weight:900;color:#8B4513;margin-bottom:10px">🍞 餵麵包給${petName}！</div>
    <div style="font-size:72px;animation:bounceIn 0.4s ease-out" id="maze-pet-big">${pet}</div>
    <div style="display:flex;justify-content:center;gap:8px;margin:14px 0" id="maze-breads">
      ${Array(5).fill('').map((_,i) =>
        `<span id="maze-bread-${i}" style="font-size:32px;transition:transform 0.4s,opacity 0.4s">🍞</span>`
      ).join('')}
    </div>
    <div id="maze-feed-result" style="font-size:16px;color:#888;min-height:40px;text-align:center"></div>`);

  let fedCount = 0;
  function feedNext() {
    if (fedCount >= 5) return;
    const breadEl = document.getElementById(`maze-bread-${fedCount}`);
    if (breadEl) { breadEl.style.transform='scale(0) translateY(-50px)'; breadEl.style.opacity='0'; }

    if (petEl) { petEl.style.animation='none'; void petEl.offsetWidth; petEl.style.animation='animalMunch 0.4s ease-in-out'; }
    fedCount++;
    if (fedCount >= 5) {
      playMelody(MAZE_MELODY, 220);
      spawnStars();
      const petEl2 = document.getElementById('maze-pet-big');

let audioCtx = null;
let soundEnabled = true;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // iOS Safari: AudioContext 初始為 suspended，需要在使用者觸控後 resume
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
// iOS / Android：第一次觸控時解鎖 AudioContext
(function setupAudioUnlock() {
  function unlock() {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    // 也預先建立一次 context 以便後續即時使用
    try { getAudioCtx(); } catch(e) {}
  }
  ['touchstart','touchend','click'].forEach(evt =>
    document.addEventListener(evt, unlock, { once: true, passive: true })
  );
})();
function playSound(type) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx(), now = ctx.currentTime;
    if (type === 'correct') {
      [523,659,784].forEach((freq,i) => {
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type='sine'; o.frequency.value=freq;
        g.gain.setValueAtTime(0.3, now+i*0.12);
        g.gain.exponentialRampToValueAtTime(0.001, now+i*0.12+0.3);
        o.start(now+i*0.12); o.stop(now+i*0.12+0.3);
      });
    } else if (type === 'wrong') {
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sawtooth'; o.frequency.value=150;
      g.gain.setValueAtTime(0.2,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.5);
      o.start(now); o.stop(now+0.5);
    } else if (type === 'hammer') {
      [440,880,1200].forEach((freq,i) => {
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type='square'; o.frequency.value=freq;
        g.gain.setValueAtTime(0.15, now+i*0.05);
        g.gain.exponentialRampToValueAtTime(0.001, now+0.4);
        o.start(now+i*0.05); o.stop(now+0.5);
      });
    } else if (type === 'dice') {
      // Rolling rattle
      for (let i=0;i<4;i++) {
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type='triangle'; o.frequency.value=180+Math.random()*120;
        g.gain.setValueAtTime(0.12, now+i*0.07);
        g.gain.exponentialRampToValueAtTime(0.001, now+i*0.07+0.1);
        o.start(now+i*0.07); o.stop(now+i*0.07+0.12);
      }
    } else if (type === 'bread') {
      // 短促 pip 音：高頻三角波快速衰減，像咬一口的聲音
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'triangle'; o.frequency.value = 1046;
      g.gain.setValueAtTime(0.25, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      o.start(now); o.stop(now + 0.13);
      const o2 = ctx.createOscillator(), g2 = ctx.createGain();
      o2.connect(g2); g2.connect(ctx.destination);
      o2.type = 'triangle'; o2.frequency.value = 1318;
      g2.gain.setValueAtTime(0.15, now + 0.07);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
      o2.start(now + 0.07); o2.stop(now + 0.19);
    } else if (type === 'step') {
      // 叩叩：短促木頭打擊音
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'triangle';
      o.frequency.setValueAtTime(320, now);
      o.frequency.exponentialRampToValueAtTime(160, now + 0.08);
      g.gain.setValueAtTime(0.22, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.09);
      o.start(now); o.stop(now + 0.1);
    }
  } catch(e) {}
}

function spawnStars() {
  const c = document.createElement('div');
  c.className = 'star-burst';
  document.body.appendChild(c);
  const s = ['⭐','🌟','✨','💫'];
  for (let i=0; i<14; i++) {
    const el = document.createElement('div');
    el.className = 'star-particle';
    el.textContent = s[i % s.length];
    const angle = (i/14)*360, dist = 110+Math.random()*160;
    el.style.left='50%'; el.style.top='40%';
    el.style.setProperty('--dx', `${Math.cos(angle*Math.PI/180)*dist}px`);
    el.style.setProperty('--dy', `${Math.sin(angle*Math.PI/180)*dist}px`);
    el.style.animationDelay = `${Math.random()*0.2}s`;
    c.appendChild(el);
  }
  setTimeout(() => c.remove(), 1500);
}

function generateSentences(english, chinese, level, wordType) {
  const type = wordType || 'noun';
  const templates = (SENTENCE_TEMPLATES[type] || SENTENCE_TEMPLATES.noun)[level]
    || SENTENCE_TEMPLATES.noun[1];
  const pool = shuffleArray([...templates]);
  return [pool[0](english, chinese), pool[1](english, chinese)];
}

function loadCustomWords() {
  try {
    const d = localStorage.getItem('englishAdventure_customWords');
    return d ? JSON.parse(d) : { level1:[], level2:[], level3:[] };
  } catch(e) { return { level1:[], level2:[], level3:[] }; }
}
function saveCustomWords(data) {
  localStorage.setItem('englishAdventure_customWords', JSON.stringify(data));
}

function registerCustomWords() {
  const cw = loadCustomWords();
  Object.values(cw).flat().forEach(w => { if (w && w.id) ALL_WORDS[w.id] = w; });
}

function addCustomWord(english, chinese, emoji, level, wordType) {
  english  = english.trim().toLowerCase();
  chinese  = chinese.trim();
  emoji    = (emoji||'').trim() || '📝';
  wordType = wordType || 'noun';
  if (!english || !chinese) return false;
  const cw   = loadCustomWords();
  const key  = 'level' + level;
  const id   = 'CUSTOM_L' + level + '_' + Date.now();
  const sents = generateSentences(english, chinese, level, wordType);
  const word  = { id, english, chinese, emoji, wordType,
    category:'custom', letters: english.split(''),
    sentences: sents };
  cw[key].push(word);
  saveCustomWords(cw);
  ALL_WORDS[id] = word;
  return true;
}

function deleteCustomWord(id, level) {
  const cw  = loadCustomWords();
  const key = 'level' + level;
  cw[key]   = cw[key].filter(w => w.id !== id);
  saveCustomWords(cw);
  delete ALL_WORDS[id];
}

function importCustomCSV(file, level, onDone) {
  const reader = new FileReader();
  reader.onload = e => {
    const lines  = e.target.result.split('\n').filter(l => l.trim());
    let added = 0;
    lines.forEach(line => {
      const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g,''));
      if (cols.length >= 2 && cols[0] && cols[1]) {
        const emoji = cols[2] || '📝';
        if (addCustomWord(cols[0], cols[1], emoji, level)) added++;
      }
    });
    if (onDone) onDone(added);
  };
  reader.readAsText(file, 'UTF-8');
}

function shuffleArray(arr) {
  const a=[...arr];
  for (let i=a.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function exportSaveCode() {
  try {
    const selected = document.querySelector('input[name="export-target"]:checked');
    const targetId = selected ? selected.value : 'all';
    let code, label;

    if (targetId === 'all') {
      const data = { v: 1, ts: Date.now(), progress: gameState.progress };
      code = 'v1:' + btoa(unescape(encodeURIComponent(JSON.stringify(data))));
      label = '全部玩家存檔碼';
    } else {
      const player = (gameState.progress.players || []).find(p => p.id === targetId);
      if (!player) { alert('找不到玩家資料'); return; }
      const data = {
        v: 1, type: 'player', ts: Date.now(),
        player: player,
        unlockedCharacters: gameState.progress.unlockedCharacters || []
      };
      code = 'v1p:' + btoa(unescape(encodeURIComponent(JSON.stringify(data))));
      label = `${CHARACTER_EMOJIS[player.character]||'🐧'} ${player.name} 的存檔碼`;
    }

    const area = document.getElementById('export-code-area');
    const text = document.getElementById('export-code-text');
    const lbl  = document.getElementById('export-code-label');
    if (area) area.style.display = 'block';
    if (text) text.value = code;
    if (lbl)  lbl.textContent = label;
    document.getElementById('copy-msg').textContent = '';
  } catch(e) {
    alert('匯出失敗：' + e.message);
  }
}

function copySaveCode() {
  const text = document.getElementById('export-code-text');
  if (!text) return;
  try {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text.value).then(() => {
        document.getElementById('copy-msg').textContent = '✅ 已複製！請貼到記事本或截圖保存';
      });
    } else {
      text.select();
      document.execCommand('copy');
      document.getElementById('copy-msg').textContent = '✅ 已複製！請貼到記事本或截圖保存';
    }
  } catch(e) {
    document.getElementById('copy-msg').textContent = '請手動長按選取文字後複製';
  }
}

function importSaveCode() {
  const raw = (document.getElementById('import-code-text').value || '').trim();
  const msg = document.getElementById('import-msg');
  if (!raw) { msg.style.color='#c62828'; msg.textContent='請先貼上存檔碼'; return; }

  const isSinglePlayer = raw.startsWith('v1p:');
  const isAllPlayers   = raw.startsWith('v1:');
  if (!isSinglePlayer && !isAllPlayers) {
    msg.style.color='#c62828'; msg.textContent='❌ 存檔碼格式不正確'; return;
  }

  try {
    const b64  = raw.slice(isSinglePlayer ? 4 : 3);
    const json = decodeURIComponent(escape(atob(b64)));
    const data = JSON.parse(json);

    if (isSinglePlayer) {
      // Single-player merge
      if (!data.player) throw new Error('資料結構錯誤');
      const p = data.player;
      const emoji = CHARACTER_EMOJIS[p.character] || '🐧';
      const existing = (gameState.progress.players || []).find(x => x.id === p.id);
      const confirmMsg = existing
        ? `還原 ${emoji} ${p.name} 的存檔？\n（${p.sessionsCompleted||0} 局）\n\n這個玩家目前的進度將被取代，其他玩家不受影響。`
        : `將 ${emoji} ${p.name} 加入本裝置？\n（${p.sessionsCompleted||0} 局）\n\n其他玩家不受影響。`;
      if (!confirm(confirmMsg)) return;

      if (!gameState.progress.players) gameState.progress.players = [];
      if (existing) {
        const idx = gameState.progress.players.indexOf(existing);
        gameState.progress.players[idx] = p;
      } else {
        gameState.progress.players.push(p);
      }
      // Merge unlocked characters
      if (data.unlockedCharacters && data.unlockedCharacters.length) {
        const cur = gameState.progress.unlockedCharacters || [];
        data.unlockedCharacters.forEach(c => { if (!cur.includes(c)) cur.push(c); });
        gameState.progress.unlockedCharacters = cur;
      }
      saveProgress();
      msg.style.color = '#2E7D32';
      msg.textContent = `✅ ${emoji} ${p.name} 已${existing ? '更新' : '加入'}！`;
      setTimeout(() => { document.getElementById('parent-overlay').style.display='none'; initStart(); }, 1200);

    } else {
      // Full restore
      if (!data.progress) throw new Error('資料結構錯誤');
      if (!confirm('確定要還原全員存檔嗎？\n目前所有進度將被取代，此動作無法復原。')) return;
      gameState.progress = data.progress;
      saveProgress();
      msg.style.color = '#2E7D32';
      msg.textContent = '✅ 全員存檔還原成功！';
      setTimeout(() => { document.getElementById('parent-overlay').style.display='none'; initStart(); }, 1200);
    }
  } catch(e) {
    msg.style.color = '#c62828';
    msg.textContent = '❌ 存檔碼無法讀取，請確認是否完整';
  }
}

}

let _cwPreviewState = null;

function _getCwWordType() {
  return document.querySelector('input[name="cw-type"]:checked')?.value || 'noun';
}

function previewCustomWord(level) {
  const en = (document.getElementById('cw-en')?.value || '').trim().toLowerCase();
  const zh = (document.getElementById('cw-zh')?.value || '').trim();
  const prev = document.getElementById('cw-preview');
  if (!en || !zh) { if (prev) prev.textContent = '請先輸入英文和中文'; return; }
  const wordType = _getCwWordType();
  const templates = (SENTENCE_TEMPLATES[wordType] || SENTENCE_TEMPLATES.noun)[level] || SENTENCE_TEMPLATES.noun[1];
  const pool = shuffleArray([...Array(templates.length).keys()]);
  _cwPreviewState = { en, zh, level, wordType, pool, slots: [pool[0], pool[1]], next: 2 };
  renderCwPreview();
}

function refreshCwSentence(slotIdx) {
  if (!_cwPreviewState) return;
  const s = _cwPreviewState;
  const templates = (SENTENCE_TEMPLATES[s.wordType] || SENTENCE_TEMPLATES.noun)[s.level] || SENTENCE_TEMPLATES.noun[1];
  const other = slotIdx === 0 ? s.slots[1] : s.slots[0];
  for (let tries = 0; tries < templates.length; tries++) {
    const candidate = s.pool[s.next % s.pool.length];
    s.next++;
    if (candidate !== other) { s.slots[slotIdx] = candidate; break; }
  }
  renderCwPreview();
}

function renderCwPreview() {
  const s = _cwPreviewState;
  const prev = document.getElementById('cw-preview');
  if (!s || !prev) return;
  const templates = (SENTENCE_TEMPLATES[s.wordType] || SENTENCE_TEMPLATES.noun)[s.level] || SENTENCE_TEMPLATES.noun[1];
  const s0 = templates[s.slots[0]](s.en, s.zh);
  const s1 = templates[s.slots[1]](s.en, s.zh);
  const btnStyle = `background:#FFF9C4;border:1.5px solid #FFD93D;border-radius:8px;
    padding:2px 8px;font-size:12px;font-weight:900;font-family:inherit;cursor:pointer;
    color:#7B4A00;white-space:nowrap;flex-shrink:0`;
  prev.innerHTML =
    `<div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:6px">
       <div style="flex:1;font-size:12px;color:#333">💬 ${s0.en}<br><span style="color:#aaa">（${s0.zh}）</span></div>
       <button onclick="refreshCwSentence(0)" style="${btnStyle}">🔄 換</button>
     </div>
     <div style="display:flex;align-items:flex-start;gap:6px">
       <div style="flex:1;font-size:12px;color:#333">💬 ${s1.en}<br><span style="color:#aaa">（${s1.zh}）</span></div>
       <button onclick="refreshCwSentence(1)" style="${btnStyle}">🔄 換</button>
     </div>`;
}

function submitCustomWord(level) {
  const en       = document.getElementById('cw-en')?.value || '';
  const zh       = document.getElementById('cw-zh')?.value || '';
  const emoji    = document.getElementById('cw-emoji')?.value || '📝';
  const wordType = _getCwWordType();
  if (!en.trim() || !zh.trim()) {
    alert('請填寫英文單字和中文翻譯！'); return;
  }
  if (addCustomWord(en, zh, emoji, level, wordType)) {
    showCustomWordBank(level);
  }
}

function handleCSVImport(event, level) {
  const file = event.target.files[0];
  if (!file) return;
  importCustomCSV(file, level, count => {
    const el = document.getElementById('cw-import-result');
    if (el) el.textContent = `✅ 成功匯入 ${count} 個單字！`;
    setTimeout(() => showCustomWordBank(level), 800);
  });
}

function testTTSNow() {
  const out = document.getElementById('tts-test-result');
  if (!window.speechSynthesis) {
    if (out) out.textContent = '❌ 此裝置不支援語音 API';
    return;
  }
  const voices = speechSynthesis.getVoices();
  const enV = voices.filter(v => v.lang && v.lang.startsWith('en'));
  const picked = _getEnVoice();
  if (out) out.textContent = `載入中…（共 ${voices.length} 個語音，英文 ${enV.length} 個）`;

  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance('hello');
  u.lang = 'en-US'; u.rate = 0.9;
  if (picked) { u.voice = picked; u.lang = picked.lang; }

  let replied = false;
  const tid = setTimeout(() => {
    if (!replied) {
      replied = true;
      if (out) out.innerHTML =
        `⚠️ 沒有回應（靜默）<br>` +
        `<span style="font-size:12px">語音總數:${voices.length} 英文:${enV.length}<br>` +
        `選用:${picked ? picked.name : '無'}<br>` +
        (enV.length === 0 ? '→ 請安裝 Google TTS 英文語音包' : '→ 已有英文語音但無聲，請回報') +
        `</span>`;
    }
  }, 4000);
  u.onend = () => {
    if (!replied) { replied = true; clearTimeout(tid);
      if (out) out.innerHTML =
        `✅ 有聲音！語音正常<br>` +
        `<span style="font-size:12px">使用：${picked ? picked.name+' ('+picked.lang+')' : 'en-US 預設'}</span>`; }
  };
  u.onerror = (e) => {
    if (!replied) { replied = true; clearTimeout(tid);
      if (out) out.innerHTML =
        `❌ 錯誤：${e.error}<br>` +
        `<span style="font-size:12px">語音:${picked ? picked.name : '無'} / 英文語音數:${enV.length}</span>`; }
  };
  setTimeout(() => speechSynthesis.speak(u), 80);
}
